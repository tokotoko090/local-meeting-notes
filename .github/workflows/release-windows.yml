name: Release Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system tools
        shell: powershell
        run: |
          choco install ffmpeg nsis -y --no-progress

      - name: Install frontend dependencies
        shell: powershell
        run: npm ci

      - name: Build installer
        shell: powershell
        run: npm run build:windows

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalMeetingNotesSetup
          path: release/LocalMeetingNotesSetup-*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installer = Get-ChildItem -Path release -Filter "LocalMeetingNotesSetup-*.exe" | Select-Object -First 1
          if (-not $installer) { throw "Installer was not found." }
          gh release create "${env:GITHUB_REF_NAME}" $installer.FullName --title "${env:GITHUB_REF_NAME}" --generate-notes
